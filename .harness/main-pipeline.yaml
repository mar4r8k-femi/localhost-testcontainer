pipeline:
  name: localstack-t3stcontainers-hosted
  identifier: localstack_testcontainers_hosted
  projectIdentifier: Reference_Architecture
  orgIdentifier: demo
  stages:

    # ── Variant A: Local Docker on Harness CI VM ──────────────────────────────
    # Three use cases, each in its own step group.
    # Every group has a Watch Container Events background step that streams
    # Docker lifecycle events (create → start → stop → destroy) in real time,
    # making the per-method container churn visible in the Harness step log.
    #
    # Use Case 1 — Async Messaging    : SqsLocalStackTest   (1 container / test)
    # Use Case 2 — Read-Through Cache : TwoContainerTest    (2 containers / test)
    # Use Case 3 — Document Storage   : ThreeContainerTest  (3 containers / test)
    - stage:
        name: "Variant A: Local Docker"
        identifier: variant_a_local_docker
        type: CI
        description: >-
          Testcontainers uses the Docker daemon running on the Harness Cloud VM.
          Three use cases demonstrate 1, 2, and 3 simultaneous containers per test method.
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:

              # ── Use Case 1: Async Messaging (SQS) ──────────────────────────
              # SqsLocalStackTest — 1 LocalStack container per test method.
              # Watch step shows: create → start → stop → destroy for each @Test.
              - stepGroup:
                  name: "UC1: Async Messaging (SQS)"
                  identifier: uc1_sqs
                  steps:
                    - step:
                        name: Watch Container Events
                        identifier: uc1_watch_events
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            echo "=== UC1: Watching container events for SQS tests ==="
                            docker events \
                              --filter 'type=container' \
                              --format '{{.Time | printf "%.19s"}} {{.Action | printf "%-10s"}} image={{.Actor.Attributes.image}} name={{.Actor.Attributes.name}}'
                    - step:
                        name: Run SQS Tests
                        identifier: uc1_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            if ! java -version 2>&1 | grep -q '"17\.'; then
                              apt-get update -qq
                              apt-get install -y openjdk-17-jdk
                            fi
                            JAVA17=$(update-alternatives --list java 2>/dev/null | grep java-17 | head -1)
                            if [ -n "$JAVA17" ]; then
                              update-alternatives --set java "$JAVA17"
                            fi
                            export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
                            export PATH="$JAVA_HOME/bin:$PATH"
                            java -version

                            mkdir -p build
                            gradle test \
                              --tests "com.example.sqs.SqsLocalStackTest.*" \
                              2>&1 | tee build/uc1-sqs-output.log

                            echo ""
                            echo "=== UC1 Summary ==="
                            grep -E "tests|BUILD" build/uc1-sqs-output.log | tail -5
                          envVariables:
                            LOCALSTACK_IMAGE: localstack/localstack:3.0
                            AWS_DEFAULT_REGION: us-east-1

              # ── Use Case 2: Read-Through Cache (Postgres + Redis) ───────────
              # TwoContainerTest — 2 containers start in parallel per test method:
              #   [1] postgres:16-alpine   [2] redis:7-alpine
              # Watch step shows both containers cycling through each @Test.
              - stepGroup:
                  name: "UC2: Read-Through Cache (Postgres + Redis)"
                  identifier: uc2_cache
                  steps:
                    - step:
                        name: Watch Container Events
                        identifier: uc2_watch_events
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            echo "=== UC2: Watching container events for Postgres + Redis tests ==="
                            docker events \
                              --filter 'type=container' \
                              --format '{{.Time | printf "%.19s"}} {{.Action | printf "%-10s"}} image={{.Actor.Attributes.image}} name={{.Actor.Attributes.name}}'
                    - step:
                        name: Run Two-Container Tests
                        identifier: uc2_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            if ! java -version 2>&1 | grep -q '"17\.'; then
                              apt-get update -qq
                              apt-get install -y openjdk-17-jdk
                            fi
                            JAVA17=$(update-alternatives --list java 2>/dev/null | grep java-17 | head -1)
                            if [ -n "$JAVA17" ]; then
                              update-alternatives --set java "$JAVA17"
                            fi
                            export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
                            export PATH="$JAVA_HOME/bin:$PATH"

                            mkdir -p build
                            gradle test \
                              --tests "com.example.multicontainer.TwoContainerTest.*" \
                              2>&1 | tee build/uc2-cache-output.log

                            echo ""
                            echo "=== UC2 Summary ==="
                            grep -E "tests|BUILD" build/uc2-cache-output.log | tail -5

              # ── Use Case 3: Document Storage (S3 + Postgres + Redis) ────────
              # ThreeContainerTest — 3 containers start in parallel per test method:
              #   [1] localstack/localstack (S3)  [2] postgres:16-alpine  [3] redis:7-alpine
              # Watch step shows all 3 containers cycling together through each @Test.
              - stepGroup:
                  name: "UC3: Document Storage (S3 + Postgres + Redis)"
                  identifier: uc3_docs
                  steps:
                    - step:
                        name: Watch Container Events
                        identifier: uc3_watch_events
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            echo "=== UC3: Watching container events for S3 + Postgres + Redis tests ==="
                            docker events \
                              --filter 'type=container' \
                              --format '{{.Time | printf "%.19s"}} {{.Action | printf "%-10s"}} image={{.Actor.Attributes.image}} name={{.Actor.Attributes.name}}'
                    - step:
                        name: Run Three-Container Tests
                        identifier: uc3_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            if ! java -version 2>&1 | grep -q '"17\.'; then
                              apt-get update -qq
                              apt-get install -y openjdk-17-jdk
                            fi
                            JAVA17=$(update-alternatives --list java 2>/dev/null | grep java-17 | head -1)
                            if [ -n "$JAVA17" ]; then
                              update-alternatives --set java "$JAVA17"
                            fi
                            export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
                            export PATH="$JAVA_HOME/bin:$PATH"

                            mkdir -p build
                            gradle test \
                              --tests "com.example.multicontainer.ThreeContainerTest.*" \
                              2>&1 | tee build/uc3-docs-output.log

                            echo ""
                            echo "=== UC3 Summary ==="
                            grep -E "tests|BUILD" build/uc3-docs-output.log | tail -5
                          envVariables:
                            LOCALSTACK_IMAGE: localstack/localstack:3.0
                            AWS_DEFAULT_REGION: us-east-1

          caching:
            enabled: true
            paths:
              - ~/.gradle/caches
          buildIntelligence:
            enabled: false

    # ── Variant B: Testcontainers Cloud (TCC) ────────────────────────────────
    # The TCC agent runs as a background daemon and rewrites the Docker socket
    # so Testcontainers sends containers to Testcontainers Cloud instead of the
    # local VM. The CI VM is purely an orchestrator — containers run remotely.
    # Requires TC_CLOUD_TOKEN secret.
    - stage:
        name: "Variant B: Testcontainers Cloud"
        identifier: variant_b_tcc
        type: CI
        description: >-
          The TCC agent proxies Docker calls to Testcontainers Cloud.
          Containers run remotely in TCC — the CI VM is purely an orchestrator.
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: TCC Agent and Tests
                  identifier: tcc_group
                  steps:
                    - step:
                        name: TCC Agent Daemon
                        identifier: tcc_agent_daemon
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            curl -fsSL \
                              https://app.testcontainers.cloud/download/testcontainers-cloud-agent_linux_x86-64 \
                              -o /usr/local/bin/tcc-agent
                            chmod +x /usr/local/bin/tcc-agent
                            echo "Starting TCC agent..."
                            tcc-agent
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                          portBindings:
                            "42145": "42145"
                    - step:
                        name: Verify Agent Ready
                        identifier: verify_agent_ready
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            echo "Waiting for TCC agent registration..."
                            timeout 60 bash -c \
                              'until [ -f ~/.testcontainers.properties ]; do sleep 3; done'

                            echo ""
                            echo "=== ~/.testcontainers.properties ==="
                            cat ~/.testcontainers.properties
                        contextType: Pipeline
                    - step:
                        name: Run Integration Tests
                        identifier: run_tests_tcc
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            if ! java -version 2>&1 | grep -q '"17\.'; then
                              apt-get update -qq
                              apt-get install -y openjdk-17-jdk
                            fi
                            JAVA17=$(update-alternatives --list java 2>/dev/null | grep java-17 | head -1)
                            if [ -n "$JAVA17" ]; then
                              update-alternatives --set java "$JAVA17"
                            fi
                            export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
                            export PATH="$JAVA_HOME/bin:$PATH"
                            java -version

                            # .testcontainers.properties uses Java escape syntax
                            # (tcp\://localhost\:42145). Strip backslashes so
                            # DOCKER_HOST is a valid URL: tcp://localhost:42145
                            export DOCKER_HOST=$(
                              grep 'docker.host' ~/.testcontainers.properties \
                                | cut -d'=' -f2- \
                                | sed 's/\\//g' \
                                | tr -d ' '
                            )

                            gradle test 2>&1 | tee test-output.log

                            echo ""
                            echo "=== Test Summary ==="
                            grep -E "tests|BUILD" test-output.log | tail -5
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                            LOCALSTACK_IMAGE: localstack/localstack:3.0
                            AWS_DEFAULT_REGION: us-east-1
                        contextType: Pipeline
          caching:
            enabled: true
            paths:
              - ~/.gradle/caches
          buildIntelligence:
            enabled: false

  tags:
    owner: danf
