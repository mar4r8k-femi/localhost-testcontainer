pipeline:
  name: localstack-t3stcontainers-hosted
  identifier: localstack_testcontainers_hosted
  projectIdentifier: Reference_Architecture
  orgIdentifier: demo
  stages:

    # ── Variant A ─────────────────────────────────────────────────────────────
    # Testcontainers talks directly to the Docker daemon on the Harness Cloud VM.
    # Containers (LocalStack) run ON the CI machine. No TCC token required.
    - stage:
        name: "Variant A - Local Docker on CI VM"
        identifier: variant_a_local_docker
        type: CI
        description: >-
          Testcontainers uses the Docker daemon running on the Harness Cloud VM.
          LocalStack containers spin up locally on the CI worker — simplest setup,
          no external account needed.
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Run LocalStack Integration Tests
                  identifier: variant_a_run_tests
                  type: Run
                  spec:
                    shell: Bash
                    command: |-
                      mvn test -B 2>&1 | tee test-output.log

                      echo ""
                      echo "=== Test Summary ==="
                      grep -E "Tests run:|BUILD" test-output.log | tail -5
                    envVariables:
                      LOCALSTACK_IMAGE: localstack/localstack:3.0
                      AWS_DEFAULT_REGION: us-east-1
                      # Prevent Ryuk from reaping the shared container between
                      # test classes; cleanup falls back to JVM shutdown hook.
                      TESTCONTAINERS_RYUK_DISABLED: "true"
          caching:
            enabled: false
            paths: []
          buildIntelligence:
            enabled: false

    # ── Variant B ─────────────────────────────────────────────────────────────
    # TCC agent proxies Docker calls to Testcontainers Cloud.
    # Containers run REMOTELY in TCC — the CI VM is purely an orchestrator.
    - stage:
        name: "Variant B - Testcontainers Cloud Agent"
        identifier: variant_b_tcc_agent
        type: CI
        description: >-
          The TCC agent runs as a background daemon and rewrites the Docker socket
          so Testcontainers sends containers to Testcontainers Cloud instead of the
          local VM. Requires TC_CLOUD_TOKEN secret.
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: TCC Agent and Tests
                  identifier: tcc_group
                  steps:
                    - step:
                        name: TCC Agent Daemon
                        identifier: tcc_agent_daemon
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            curl -fsSL \
                              https://app.testcontainers.cloud/download/testcontainers-cloud-agent_linux_x86-64 \
                              -o /usr/local/bin/tcc-agent
                            chmod +x /usr/local/bin/tcc-agent
                            echo "Starting TCC agent..."
                            tcc-agent
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                          portBindings:
                            "42145": "42145"
                    - step:
                        name: Verify Agent Ready
                        identifier: verify_agent_ready
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            echo "Waiting for TCC agent registration..."
                            timeout 60 bash -c \
                              'until [ -f ~/.testcontainers.properties ]; do sleep 3; done'

                            echo ""
                            echo "=== ~/.testcontainers.properties ==="
                            cat ~/.testcontainers.properties
                            # docker.host=tcp\://localhost\:42145
                            # Containers will run in TCC cloud, not on this VM
                        contextType: Pipeline
                    - step:
                        name: Run LocalStack Integration Tests
                        identifier: variant_b_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |-
                            export DOCKER_HOST=$(
                              grep 'docker.host' ~/.testcontainers.properties \
                                | cut -d'=' -f2 \
                                | tr -d ' '
                            )

                            mvn test -B 2>&1 | tee test-output.log

                            echo ""
                            echo "=== Test Summary ==="
                            grep -E "Tests run:|BUILD" test-output.log | tail -5
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                            LOCALSTACK_IMAGE: localstack/localstack:3.0
                            AWS_DEFAULT_REGION: us-east-1
                        contextType: Pipeline
          caching:
            enabled: false
            paths: []
          buildIntelligence:
            enabled: false

  tags:
    owner: danf
