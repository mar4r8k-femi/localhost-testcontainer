pipeline:
  name: localstack-t3stcontainers-hosted
  identifier: localstack_testcontainers_hosted
  projectIdentifier: Reference_Architecture
  orgIdentifier: demo
  stages:

    # ── Variant A: Local Docker on Harness CI VM ──────────────────────────────
    # Testcontainers connects to Docker running directly on the Harness Cloud VM.
    # No TCC agent needed — Docker socket is available at /var/run/docker.sock.
    - stage:
        name: "Variant A: Local Docker"
        identifier: variant_a_local_docker
        type: CI
        description: >-
          Testcontainers uses the Docker daemon running on the Harness Cloud VM.
          Containers start and stop on the same VM that runs the tests.
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Run Integration Tests
                  identifier: run_tests_local
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      if ! java -version 2>&1 | grep -q '"17\.'; then
                        apt-get update -qq
                        apt-get install -y openjdk-17-jdk
                      fi
                      JAVA17=$(update-alternatives --list java 2>/dev/null | grep java-17 | head -1)
                      if [ -n "$JAVA17" ]; then
                        update-alternatives --set java "$JAVA17"
                      fi
                      export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
                      export PATH="$JAVA_HOME/bin:$PATH"
                      java -version

                      gradle test 2>&1 | tee test-output.log

                      echo ""
                      echo "=== Test Summary ==="
                      grep -E "tests|BUILD" test-output.log | tail -5
                    envVariables:
                      LOCALSTACK_IMAGE: localstack/localstack:3.0
                      AWS_DEFAULT_REGION: us-east-1
          caching:
            enabled: true
            paths:
              - ~/.gradle/caches
          buildIntelligence:
            enabled: false

    # ── Variant B: Testcontainers Cloud (TCC) ────────────────────────────────
    # The TCC agent runs as a background daemon and rewrites the Docker socket
    # so Testcontainers sends containers to Testcontainers Cloud instead of the
    # local VM. The CI VM is purely an orchestrator — containers run remotely.
    # Requires TC_CLOUD_TOKEN secret.
    - stage:
        name: "Variant B: Testcontainers Cloud"
        identifier: variant_b_tcc
        type: CI
        description: >-
          The TCC agent proxies Docker calls to Testcontainers Cloud.
          Containers run remotely in TCC — the CI VM is purely an orchestrator.
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: TCC Agent and Tests
                  identifier: tcc_group
                  steps:
                    - step:
                        name: TCC Agent Daemon
                        identifier: tcc_agent_daemon
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            curl -fsSL \
                              https://app.testcontainers.cloud/download/testcontainers-cloud-agent_linux_x86-64 \
                              -o /usr/local/bin/tcc-agent
                            chmod +x /usr/local/bin/tcc-agent
                            echo "Starting TCC agent..."
                            tcc-agent
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                          portBindings:
                            "42145": "42145"
                    - step:
                        name: Verify Agent Ready
                        identifier: verify_agent_ready
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            echo "Waiting for TCC agent registration..."
                            timeout 60 bash -c \
                              'until [ -f ~/.testcontainers.properties ]; do sleep 3; done'

                            echo ""
                            echo "=== ~/.testcontainers.properties ==="
                            cat ~/.testcontainers.properties
                        contextType: Pipeline
                    - step:
                        name: Run Integration Tests
                        identifier: run_tests_tcc
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            if ! java -version 2>&1 | grep -q '"17\.'; then
                              apt-get update -qq
                              apt-get install -y openjdk-17-jdk
                            fi
                            JAVA17=$(update-alternatives --list java 2>/dev/null | grep java-17 | head -1)
                            if [ -n "$JAVA17" ]; then
                              update-alternatives --set java "$JAVA17"
                            fi
                            export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
                            export PATH="$JAVA_HOME/bin:$PATH"
                            java -version

                            # .testcontainers.properties uses Java escape syntax
                            # (tcp\://localhost\:42145). Strip backslashes so
                            # DOCKER_HOST is a valid URL: tcp://localhost:42145
                            export DOCKER_HOST=$(
                              grep 'docker.host' ~/.testcontainers.properties \
                                | cut -d'=' -f2- \
                                | sed 's/\\//g' \
                                | tr -d ' '
                            )

                            gradle test 2>&1 | tee test-output.log

                            echo ""
                            echo "=== Test Summary ==="
                            grep -E "tests|BUILD" test-output.log | tail -5
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                            LOCALSTACK_IMAGE: localstack/localstack:3.0
                            AWS_DEFAULT_REGION: us-east-1
                        contextType: Pipeline
          caching:
            enabled: true
            paths:
              - ~/.gradle/caches
          buildIntelligence:
            enabled: false

  tags:
    owner: danf
