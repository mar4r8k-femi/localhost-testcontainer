pipeline:
  name: Testcontainers
  identifier: localstacktestcontainers
  projectIdentifier: Femi_Sandbox
  orgIdentifier: sandbox
  tags: {}
  stages:
    - stage:
        name: Variant A Local Docker
        identifier: variant_a_local_docker
        type: CI
        description: Testcontainers uses the Docker daemon running on the Harness Cloud VM. Three use cases demonstrate 1, 2, and 3 simultaneous containers per test method.
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.variant> == "A" || <+pipeline.variables.variant> == "both"
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Watch Container Events
                  identifier: watch_container_events
                  type: Background
                  spec:
                    shell: Bash
                    command: |
                      echo "=== Watching Docker container events for all use cases ==="
                      docker events \
                        --filter 'type=container' \
                        --format '{{.Time | printf "%.19s"}} {{.Action | printf "%-10s"}} image={{.Actor.Attributes.image}} name={{.Actor.Attributes.name}}'
              - stepGroup:
                  name: UC1 Async Messaging
                  identifier: uc1_sqs
                  steps:
                    - step:
                        name: Run Localstack-SQS Tests
                        identifier: uc1_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |-
                            mkdir -p build
                            gradle test \
                              --tests "com.example.sqs.SqsLocalStackTest.*" \
                              2>&1 | tee build/uc1-sqs-output.log

                            echo ""
                            echo "=== UC1 Summary ==="
                            grep -E "tests|BUILD" build/uc1-sqs-output.log | tail -5
              - stepGroup:
                  name: "UC2 Read-Through Cache "
                  identifier: uc2_cache
                  steps:
                    - step:
                        name: Run Postgres Redis Tests
                        identifier: uc2_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |-
                            mkdir -p build
                            gradle test \
                              --tests "com.example.multicontainer.TwoContainerTest.*" \
                              2>&1 | tee build/uc2-cache-output.log

                            echo ""
                            echo "=== UC2 Summary ==="
                            grep -E "tests|BUILD" build/uc2-cache-output.log | tail -5
              - stepGroup:
                  name: UC3 Document Storage
                  identifier: uc3_docs
                  steps:
                    - step:
                        name: Run Localstack-S3 Postgres Redis Tests
                        identifier: uc3_run_tests
                        type: Run
                        spec:
                          shell: Bash
                          command: |-
                            mkdir -p build
                            gradle test \
                              --tests "com.example.multicontainer.ThreeContainerTest.*" \
                              2>&1 | tee build/uc3-docs-output.log

                            echo ""
                            echo "=== UC3 Summary ==="
                            grep -E "tests|BUILD" build/uc3-docs-output.log | tail -5
          caching:
            enabled: true
            paths:
              - ~/.gradle/caches
          buildIntelligence:
            enabled: false
    - stage:
        name: Variant B Testcontainers Cloud
        identifier: variant_b_tcc
        type: CI
        description: The TCC agent proxies Docker calls to Testcontainers Cloud. Containers run remotely in TCC — the CI VM is purely an orchestrator.
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.variant> == "B" || <+pipeline.variables.variant> == "both"
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: TCC Agent and Tests
                  identifier: tcc_group
                  steps:
                    - step:
                        name: TCC Agent Daemon
                        identifier: tcc_agent_daemon
                        type: Background
                        spec:
                          shell: Bash
                          command: |
                            curl -fsSL \
                              https://app.testcontainers.cloud/download/testcontainers-cloud-agent_linux_x86-64 \
                              -o /usr/local/bin/tcc-agent
                            chmod +x /usr/local/bin/tcc-agent
                            echo "Starting TCC agent..."
                            tcc-agent
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                          portBindings:
                            "42145": "42145"
                    - step:
                        name: Verify Agent Ready
                        identifier: verify_agent_ready
                        type: Run
                        spec:
                          shell: Bash
                          command: |
                            echo "Waiting for TCC agent registration..."
                            timeout 60 bash -c \
                              'until [ -f ~/.testcontainers.properties ]; do sleep 3; done'

                            echo ""
                            echo "=== ~/.testcontainers.properties ==="
                            cat ~/.testcontainers.properties
                        contextType: Pipeline
                    - step:
                        name: Run Integration Tests
                        identifier: run_tests_tcc
                        type: Run
                        spec:
                          shell: Bash
                          command: |-
                            export DOCKER_HOST=$(
                              grep 'docker.host' ~/.testcontainers.properties \
                                | cut -d'=' -f2 \
                                | tr -d ' '
                            )
                            git clone https://github.com/AtomicJar/testcontainers-cloud-java-example
                            cd testcontainers-cloud-java-example

                            ./mvnw test -B 2>&1 | tee test-output.log

                            echo ""
                            echo "=== Test Summary ==="
                            grep -E "Tests run:|BUILD" test-output.log | tail -5
                          envVariables:
                            TC_CLOUD_TOKEN: <+secrets.getValue("account.testcontainer-token-demo")>
                            LOCALSTACK_IMAGE: localstack/localstack:3.0
                            AWS_DEFAULT_REGION: us-east-1
                        contextType: Pipeline
          caching:
            enabled: true
            paths:
              - ~/.gradle/caches
          buildIntelligence:
            enabled: false
  variables:
    - name: variant
      type: String
      description: "Which variant to run: A (local Docker), B (Testcontainers Cloud), or both"
      required: true
      value: <+input>.allowedValues(A,B,both)
  properties:
    ci:
      codebase:
        connectorRef: femigithub
        repoName: localhost-testcontainer
        build: <+input>
        sparseCheckout: []
